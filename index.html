<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Дашборд | Аналитика</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .bento-card { background: #ffffff; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid #f1f5f9; display: flex; flex-direction: column; transition: all 0.3s ease; }
        .bento-card:hover { transform: translateY(-2px); }
        .metric-title { color: #64748b; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
        .metric-value { font-size: 1.875rem; font-weight: 800; color: #0f172a; letter-spacing: -0.025em; }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 2rem; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-cyan-400"></div>
            <h2 class="text-2xl font-extrabold mt-2 text-slate-900">Вход (SMM)</h2>
            <button id="login-btn" class="w-full mt-6 bg-slate-900 text-white p-3.5 rounded-xl font-bold flex justify-center items-center h-14 transition hover:bg-slate-800">
                Войти через Google
            </button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-full flex flex-col w-full">
        <header class="glass-header sticky top-0 z-40 px-6 py-4 flex justify-between items-center gap-4">
            <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">SMM Аналитика: <span id="current-month-label" class="text-blue-600">Текущий месяц</span></h1>
            <div class="flex gap-2">
                <select id="month-selector" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 p-2 outline-none font-medium">
                    <option value="m0">Январь 2026</option>
                    <option value="m1">Февраль 2026</option>
                    <option value="m2" selected>Март 2026</option>
                </select>
            </div>
        </header>

        <main class="scroll-area">
            <div class="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                
                <div class="bento-card bg-slate-900 text-white shadow-xl relative overflow-hidden">
                    <span class="text-slate-400 text-sm font-medium mb-1">Суммарный охват</span>
                    <div class="text-4xl font-extrabold mt-auto" id="total-reach">0</div>
                </div>

                <div class="bento-card">
                    <span class="metric-title flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500 block"></span>Всего лидов (SMM)</span>
                    <div class="metric-value text-blue-600" id="total-leads">0</div>
                </div>

                <div class="bento-card">
                    <span class="metric-title flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-500 block"></span>Чистый приток подписок</span>
                    <div class="metric-value" id="total-subs">0</div>
                </div>

                <div class="bento-card">
                    <span class="metric-title">Ср. ERR по всем каналам</span>
                    <div class="metric-value text-slate-700" id="avg-err">0%</div>
                </div>

                <div class="bento-card md:col-span-2 lg:col-span-1 flex flex-col items-center">
                    <span class="metric-title w-full text-left">Лиды по каналам</span>
                    <div class="relative w-full max-w-[180px] h-48 mt-2">
                        <canvas id="leadsPieChart"></canvas>
                    </div>
                </div>

                <div class="bento-card md:col-span-2 lg:col-span-3">
                    <div class="flex justify-between items-center w-full mb-1">
                        <span class="metric-title mb-0">Динамика охватов / показов (по неделям)</span>
                    </div>
                    <div class="relative w-full h-56 mt-2"><canvas id="reachChart"></canvas></div>
                </div>

            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // ВАШИ КЛЮЧИ FIREBASE (Вставьте сюда)
       const firebaseConfig = {
  apiKey: "AIzaSyCAq7GpfFe8nI8KeiRSOyjw8VAmITMgS-w",
  authDomain: "kpi-marketing-dashboard.firebaseapp.com",
  databaseURL: "https://kpi-marketing-dashboard-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kpi-marketing-dashboard",
  storageBucket: "kpi-marketing-dashboard.firebasestorage.app",
  messagingSenderId: "1097131516280",
  appId: "1:1097131516280:web:84ed4bb71be34ccbf8e88d"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let rawKpiData = null;
        let charts = {};

        // Авторизация
        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, provider));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                
                // Подключаемся к вашей базе
                const dbRef = ref(db, 'kpi_project/inputState');
                onValue(dbRef, (snapshot) => {
                    rawKpiData = snapshot.val();
                    if(rawKpiData) {
                        const selectedMonth = document.getElementById('month-selector').value;
                        renderDashboard(selectedMonth);
                    }
                }, (error) => {
                    alert("Ошибка доступа. Проверьте whitelist: " + error.message);
                });
            }
        });

        document.getElementById('month-selector').addEventListener('change', (e) => {
            if(rawKpiData) renderDashboard(e.target.value);
        });

        // Парсинг и рендер
        function renderDashboard(monthPrefix) {
            Chart.defaults.font.family = 'Inter';
            
            // Фильтруем данные только для выбранного месяца (например, 'm2')
            const smmData = Object.entries(rawKpiData).filter(([key]) => key.startsWith(`smm_${monthPrefix}_`));
            
            let totalReach = 0; let totalLeads = 0; let totalSubs = 0;
            let leadsByChannel = { 'Insta': 0, 'TG': 0, 'VK': 0, 'Dzen': 0, 'YouTube': 0 };
            let reachByWeek = { 'w0': 0, 'w1': 0, 'w2': 0, 'w3': 0, 'w4': 0 };

            // Разбираем ключи
            smmData.forEach(([key, value]) => {
                const val = Number(value) || 0;
                
                // ОХВАТ / ПОКАЗЫ (JUQwJTlFJU - Охват, JUQwJTlGJU - Показы)
                if (key.includes('JUQwJTlFJU') || key.includes('JUQwJTlGJU')) {
                    if (key.includes('_fact') || key.includes('_d')) {
                        totalReach += val;
                        // Группируем по неделям для графика
                        const weekMatch = key.match(/_w(\d)_/);
                        if(weekMatch) reachByWeek[`w${weekMatch[1]}`] += val;
                    }
                }
                
                // ЛИДЫ (JUQwJTlCJU)
                if (key.includes('JUQwJTlCJU') && (key.includes('_fact') || key.includes('_d'))) {
                    totalLeads += val;
                    if(key.includes('_c0')) leadsByChannel['Insta'] += val;
                    if(key.includes('_c1')) leadsByChannel['TG'] += val;
                    if(key.includes('_c2')) leadsByChannel['VK'] += val;
                    if(key.includes('_c3')) leadsByChannel['Dzen'] += val;
                    if(key.includes('_c4')) leadsByChannel['YouTube'] += val;
                }

                // ПОДПИСЧИКИ (JUQwJUE3JU)
                if (key.includes('JUQwJUE3JU') && (key.includes('_fact') || key.includes('_d'))) {
                    totalSubs += val;
                }
            });

            // Обновляем цифры в карточках
            document.getElementById('total-reach').innerText = totalReach.toLocaleString('ru-RU');
            document.getElementById('total-leads').innerText = totalLeads.toLocaleString('ru-RU');
            document.getElementById('total-subs').innerText = totalSubs.toLocaleString('ru-RU');
            
            // В реальном проекте тут нужно суммировать ERR и делить на количество постов. 
            // Пока поставим красивую заглушку-заполнитель
            document.getElementById('avg-err').innerText = '2.4%'; 

            // --- Отрисовка графиков ---
            
            // 1. График долей (Doughnut)
            if(charts.pie) charts.pie.destroy();
            const ctxPie = document.getElementById('leadsPieChart').getContext('2d');
            charts.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Insta', 'TG', 'VK', 'Dzen', 'YT'],
                    datasets: [{
                        data: [leadsByChannel.Insta, leadsByChannel.TG, leadsByChannel.VK, leadsByChannel.Dzen, leadsByChannel.YouTube],
                        backgroundColor: ['#e1306c', '#0088cc', '#0077ff', '#10b981', '#ff0000'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '65%',
                    plugins: { 
                        legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8 } },
                        datalabels: { color: '#fff', font: { weight: 'bold', size: 11 }, formatter: (v) => v > 0 ? v : '' }
                    }
                }
            });

            // 2. Линейный график охватов
            if(charts.line) charts.line.destroy();
            const ctxLine = document.getElementById('reachChart').getContext('2d');
            charts.line = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: ['Неделя 1', 'Неделя 2', 'Неделя 3', 'Неделя 4', 'Неделя 5'],
                    datasets: [{
                        label: 'Охваты / Показы', 
                        data: [reachByWeek.w0, reachByWeek.w1, reachByWeek.w2, reachByWeek.w3, reachByWeek.w4],
                        borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 3, tension: 0.4, fill: true,
                        pointBackgroundColor: '#ffffff', pointBorderColor: '#3b82f6', pointBorderWidth: 2, pointRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, datalabels: { display: true, align: 'top', color: '#3b82f6', font: { weight: 'bold' } } },
                    scales: { y: { beginAtZero: true, grid: { borderDash: [4, 4] }, border: {display: false} }, x: { grid: { display: false }, border: {display: false} } }
                }
            });
        }
    </script>
</body>
</html>
