<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Дашборд | Аналитика</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .bento-card { background: #ffffff; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid #f1f5f9; display: flex; flex-direction: column; }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 2rem; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .filter-input { background: #f8fafc; border: 1px solid #e2e8f0; color: #334155; font-size: 0.875rem; font-weight: 500; border-radius: 0.75rem; padding: 0.5rem 0.75rem; outline: none; transition: all 0.2s; }
        .filter-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .filter-label { display: block; font-size: 0.75rem; font-weight: 600; color: #64748b; margin-bottom: 0.375rem; text-transform: uppercase; letter-spacing: 0.025em; }
    </style>
</head>
<body class="antialiased">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-cyan-400"></div>
            <h2 class="text-2xl font-extrabold mt-2 text-slate-900">Вход (SMM)</h2>
            <button id="login-btn" class="w-full mt-6 bg-slate-900 text-white p-3.5 rounded-xl font-bold flex justify-center items-center h-14 transition hover:bg-slate-800">
                Войти через Google
            </button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-full flex flex-col w-full">
        <header class="glass-header sticky top-0 z-40 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">SMM Аналитика: <span id="current-month-label" class="text-blue-600">...</span></h1>
            </div>
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
                <div class="bg-slate-200/50 p-1 rounded-xl flex text-sm font-semibold w-full sm:w-auto overflow-x-auto">
                    <button id="tab-current" onclick="switchTab('current')" class="px-4 py-2 bg-white text-slate-900 shadow-sm rounded-lg flex-1 sm:flex-none whitespace-nowrap transition-all">Текущий месяц</button>
                    <button id="tab-global" onclick="switchTab('global')" class="px-4 py-2 text-slate-500 hover:text-slate-900 rounded-lg flex-1 sm:flex-none whitespace-nowrap transition-all">Общая динамика</button>
                </div>
            </div>
        </header>

        <main class="scroll-area" id="view-current">
            <div class="max-w-7xl mx-auto p-4 sm:p-6">
                
                <div class="flex flex-col sm:flex-row gap-4 mb-6 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex gap-4 flex-1">
                        <div class="w-full sm:w-auto">
                            <span class="filter-label">Период анализа</span>
                            <input type="text" id="current-date-range" class="filter-input w-full sm:w-64" placeholder="Выберите диапазон дат...">
                        </div>
                    </div>
                    <div>
                        <span class="filter-label">Рекламный канал</span>
                        <select id="current-channel" class="filter-input w-full sm:w-auto min-w-[180px]">
                            <option value="all">Все каналы</option>
                        </select>
                    </div>
                </div>

                <div id="error-container" class="hidden mb-6 bg-rose-50 border border-rose-200 text-rose-700 p-4 rounded-xl text-sm font-medium"></div>

                <div class="flex flex-col gap-6">
                    
                    <div class="bento-card flex flex-col lg:flex-row gap-6 p-6">
                        <div class="flex-1 min-w-[200px] flex flex-col">
                            <span class="metric-title">Суммарный охват / Показы</span>
                            <div class="metric-value mt-1" id="val-reach">0</div>
                            <div class="mt-auto w-full" id="diff-reach"></div>
                        </div>
                        <div class="flex-1 relative min-h-[140px] flex flex-col items-center lg:border-l lg:border-r border-slate-100 px-4">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">Доли каналов</span>
                            <div class="w-full h-[120px] relative"><canvas id="pie-reach"></canvas></div>
                        </div>
                        <div class="flex-[2] relative min-h-[140px]">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Динамика по дням</span>
                            <div class="w-full h-[120px] relative"><canvas id="line-reach"></canvas></div>
                        </div>
                    </div>

                    <div class="bento-card flex flex-col lg:flex-row gap-6 p-6">
                        <div class="flex-1 min-w-[200px] flex flex-col">
                            <span class="metric-title flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500 block"></span>Всего лидов</span>
                            <div class="metric-value text-blue-600 mt-1" id="val-leads">0</div>
                            <div class="mt-auto w-full" id="diff-leads"></div>
                        </div>
                        <div class="flex-1 relative min-h-[140px] flex flex-col items-center lg:border-l lg:border-r border-slate-100 px-4">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">Доли каналов</span>
                            <div class="w-full h-[120px] relative"><canvas id="pie-leads"></canvas></div>
                        </div>
                        <div class="flex-[2] relative min-h-[140px]">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Динамика по дням</span>
                            <div class="w-full h-[120px] relative"><canvas id="line-leads"></canvas></div>
                        </div>
                    </div>

                    <div class="bento-card flex flex-col lg:flex-row gap-6 p-6">
                        <div class="flex-1 min-w-[200px] flex flex-col">
                            <span class="metric-title flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-500 block"></span>Приток подписчиков</span>
                            <div class="metric-value mt-1" id="val-subs">0</div>
                            <div class="mt-auto w-full" id="diff-subs"></div>
                        </div>
                        <div class="flex-1 relative min-h-[140px] flex flex-col items-center lg:border-l lg:border-r border-slate-100 px-4">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">Доли каналов</span>
                            <div class="w-full h-[120px] relative"><canvas id="pie-subs"></canvas></div>
                        </div>
                        <div class="flex-[2] relative min-h-[140px]">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Динамика по дням</span>
                            <div class="w-full h-[120px] relative"><canvas id="line-subs"></canvas></div>
                        </div>
                    </div>

                    <div class="bento-card flex flex-col lg:flex-row gap-6 p-6">
                        <div class="flex-1 min-w-[200px] flex flex-col">
                            <span class="metric-title">Средний уровень ERR</span>
                            <div class="metric-value text-slate-700 mt-1" id="val-err">0%</div>
                            <div class="mt-auto w-full" id="diff-err"></div>
                        </div>
                        <div class="flex-1 relative min-h-[140px] flex flex-col items-center lg:border-l lg:border-r border-slate-100 px-4">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">ERR по каналам</span>
                            <div class="w-full h-[120px] relative"><canvas id="pie-err"></canvas></div>
                        </div>
                        <div class="flex-[2] relative min-h-[140px]">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Динамика по дням</span>
                            <div class="w-full h-[120px] relative"><canvas id="line-err"></canvas></div>
                        </div>
                    </div>

                </div>
            </div>
        </main>

        <main class="scroll-area hidden" id="view-global">
            <div class="max-w-7xl mx-auto p-4 sm:p-6">
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAq7GpfFe8nI8KeiRSOyjw8VAmITMgS-w",
            authDomain: "kpi-marketing-dashboard.firebaseapp.com",
            databaseURL: "https://kpi-marketing-dashboard-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kpi-marketing-dashboard",
            storageBucket: "kpi-marketing-dashboard.firebasestorage.app",
            messagingSenderId: "1097131516280",
            appId: "1:1097131516280:web:84ed4bb71be34ccbf8e88d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let rawData = null; 
        window.monthsData = null; 
        let datePicker = null; 
        window.smmCharts = {};

        window.switchTab = function(tabName) {
            const viewCurrent = document.getElementById('view-current');
            const viewGlobal = document.getElementById('view-global');
            const btnCurrent = document.getElementById('tab-current');
            const btnGlobal = document.getElementById('tab-global');
            const activeClass = "px-4 py-2 bg-white text-slate-900 shadow-sm rounded-lg flex-1 sm:flex-none whitespace-nowrap transition-all";
            const inactiveClass = "px-4 py-2 text-slate-500 hover:text-slate-900 rounded-lg flex-1 sm:flex-none whitespace-nowrap transition-all";

            if (tabName === 'current') {
                viewCurrent.classList.remove('hidden'); viewGlobal.classList.add('hidden');
                btnCurrent.className = activeClass; btnGlobal.className = inactiveClass;
                processCurrentMonthData(); 
            } else {
                viewCurrent.classList.add('hidden'); viewGlobal.classList.remove('hidden');
                btnCurrent.className = inactiveClass; btnGlobal.className = activeClass;
            }
        };

        const formatNum = (num) => new Intl.NumberFormat('ru-RU').format(Math.round(num || 0));
        const formatPerc = (num) => (num || 0).toFixed(2) + '%';

        // Функция для вычисления "Дней с начала периода" (учитывает текущий день)
        function getDaysPassed(dateStart, dateEnd) {
            const today = new Date();
            let end = dateEnd;
            if (dateEnd > today) end = today; // Если конец в будущем - обрезаем по сегодня
            if (dateStart > today) return 1; // Защита от будущих месяцев
            const diffTime = Math.abs(end - dateStart);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            return Math.max(1, diffDays);
        }

        // Обновленный бейдж сравнения по среднедневному темпу
        function getCompareBadge(currentTotal, prevTotal, currentDays, prevDays, isPercent = false) {
            if (prevTotal === 0 || prevTotal === undefined || isNaN(prevTotal)) return `<div class="badge badge-neutral mt-2">Нет данных за прошлый месяц</div>`;
            
            let currentMetric = currentTotal;
            let prevMetric = prevTotal;
            
            // Если это не проценты (не ERR), считаем среднедневное значение
            if (!isPercent) {
                currentMetric = currentTotal / Math.max(1, currentDays);
                prevMetric = prevTotal / Math.max(1, prevDays);
            }

            const diff = ((currentMetric - prevMetric) / prevMetric) * 100;
            const colorClass = diff >= 0 ? 'badge-green' : 'badge-red';
            const trendText = diff >= 0 ? '👍 Темп выше' : '📉 Темп ниже';
            const diffAbs = Math.abs(diff).toFixed(1);
            
            let prevText = isPercent ? prevTotal.toFixed(2) + '%' : formatNum(prevMetric) + ' / день';
            let currentDailyHtml = '';
            
            if (!isPercent) {
                currentDailyHtml = `<span class="block text-[11px] font-bold text-slate-500 mb-1 border-b border-slate-100 pb-1 w-full uppercase tracking-wide">В среднем: <span class="text-slate-800">${formatNum(currentMetric)}</span> в день</span>`;
            }

            return `
                <div class="mt-3 flex flex-col items-start w-full bg-slate-50 rounded-lg p-2 border border-slate-100">
                    ${currentDailyHtml}
                    <div class="badge ${colorClass} flex flex-col gap-1 items-start w-full border-none px-2 py-1 mt-1">
                        <span class="font-bold">${trendText} на ${diffAbs}%</span>
                        <span class="text-[10px] font-medium opacity-80">Прошлый мес: ${prevText}</span>
                    </div>
                </div>
            `;
        }

        function renderPie(id, dataObj, monthIndex, isAverage = false) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (window.smmCharts[id]) window.smmCharts[id].destroy();
            
            const defaultColors = ['#e1306c', '#0088cc', '#0077ff', '#10b981', '#ff0000', '#8b5cf6', '#f59e0b', '#14b8a6', '#f43f5e', '#64748b'];
            const fLabels = [], fValues = [], fColors = [];
            
            Object.keys(dataObj).forEach(cKey => {
                const v = dataObj[cKey];
                if (v > 0) {
                    let cName = cKey;
                    const cNum = parseInt(cKey.replace('c', ''));
                    
                    if (!isNaN(cNum) && window.monthsData && window.monthsData[monthIndex] && window.monthsData[monthIndex].smmChannels && window.monthsData[monthIndex].smmChannels[cNum]) {
                        cName = window.monthsData[monthIndex].smmChannels[cNum].name;
                    } else if (!isNaN(cNum)) {
                        cName = `Канал ${cNum + 1}`;
                    }

                    fLabels.push(cName);
                    fValues.push(v);
                    fColors.push(defaultColors[cNum % defaultColors.length]);
                }
            });

            if (fValues.length === 0) { fLabels.push('Нет данных'); fValues.push(1); fColors.push('#e2e8f0'); }

            window.smmCharts[id] = new Chart(ctx, {
                type: 'doughnut', 
                data: { labels: fLabels, datasets: [{ data: fValues, backgroundColor: fColors, borderWidth: 0 }] },
                plugins: [ChartDataLabels], 
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '65%',
                    plugins: { legend: { display: false }, datalabels: { color: '#fff', font: { weight: 'bold', size: 10 }, formatter: (v) => {
                        if (v === 1 && fLabels[0] === 'Нет данных') return '';
                        if (isAverage) return v.toFixed(1) + '%';
                        if (v >= 1000000) return (v/1000000).toFixed(1) + 'M';
                        if (v >= 1000) return (v/1000).toFixed(0) + 'k';
                        return Math.round(v);
                    } } }
                }
            });
        }

        function renderLine(id, timelineArray, color, isPercent = false) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (window.smmCharts[id]) window.smmCharts[id].destroy();

            let lastNonZero = timelineArray.length - 1;
            while(lastNonZero >= 0 && timelineArray[lastNonZero] === 0) lastNonZero--;
            const activeData = timelineArray.slice(0, lastNonZero >= 0 ? lastNonZero + 1 : 0);
            const labels = activeData.map((_, i) => `День ${i+1}`);

            window.smmCharts[id] = new Chart(ctx, {
                type: 'line', 
                data: { labels: labels, datasets: [{ data: activeData, borderColor: color, backgroundColor: color + '1a', borderWidth: 2, tension: 0.4, fill: true, pointRadius: 1, pointHoverRadius: 5 }] },
                plugins: [ChartDataLabels], 
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { x: { display: false }, y: { border: {display: false}, grid: { borderDash: [4, 4] }, ticks: { callback: v => isPercent ? v + '%' : v } } }, interaction: { mode: 'index', intersect: false } }
            });
        }

        function updateMonthLabel(date) {
            const monthName = date.toLocaleString('ru-RU', { month: 'long' });
            document.getElementById('current-month-label').innerText = monthName.charAt(0).toUpperCase() + monthName.slice(1);
        }

        // Обновление дропдауна с безопасной проверкой объекта/массива
        function updateChannelDropdown(monthIndex, currentSelection) {
            const select = document.getElementById('current-channel');
            select.innerHTML = '<option value="all">Все каналы</option>';
            
            if (window.monthsData && window.monthsData[monthIndex] && window.monthsData[monthIndex].smmChannels) {
                const channels = window.monthsData[monthIndex].smmChannels;
                for (let key in channels) {
                    if (!channels[key]) continue;
                    const opt = document.createElement('option');
                    opt.value = `c${key}`;
                    opt.innerText = channels[key].name;
                    if (`c${key}` === currentSelection) opt.selected = true;
                    select.appendChild(opt);
                }
            }
        }

        function setInitialDates() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const firstDay = `${year}-${month}-01`;
            const lastDay = new Date(year, today.getMonth() + 1, 0).getDate();
            
            datePicker = flatpickr("#current-date-range", {
                mode: "range", dateFormat: "Y-m-d", defaultDate: [firstDay, `${year}-${month}-${lastDay}`], locale: "ru",
                onChange: function(dates) { if (dates.length === 2) { updateMonthLabel(dates[0]); processCurrentMonthData(); } }
            });
            updateMonthLabel(today);
        }

        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, provider));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                setInitialDates(); 
                
                const dbRef = ref(db, 'kpi_project');
                onValue(dbRef, (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        rawData = data.inputState || {};
                        window.monthsData = data.monthsData || {};
                        document.getElementById('error-container').classList.add('hidden');
                        processCurrentMonthData();
                    }
                }, (error) => { alert("Доступ запрещен. Проверьте права в Firebase."); });
            }
        });

        function processCurrentMonthData() {
            try {
                if (!rawData || !datePicker) return;
                const selectedDates = datePicker.selectedDates;
                if (selectedDates.length < 2) return; 

                const targetDate = selectedDates[0];
                const ruMonths = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
                const targetString = `${ruMonths[targetDate.getMonth()]} ${targetDate.getFullYear()}`;
                
                // Безопасный поиск месяца (работает и с массивами, и с объектами Firebase)
                let monthIndex = -1;
                if (window.monthsData) {
                    for (let key in window.monthsData) {
                        if (window.monthsData[key] && window.monthsData[key].name === targetString) {
                            monthIndex = parseInt(key);
                            break;
                        }
                    }
                }
                if (monthIndex === -1) {
                    monthIndex = (targetDate.getFullYear() - 2026) * 12 + targetDate.getMonth();
                }
                
                const curPrefix = `m${monthIndex}`;
                const prevPrefix = `m${Math.max(0, monthIndex - 1)}`;
                
                const channelFilterEl = document.getElementById('current-channel');
                const channelFilter = channelFilterEl.value;
                updateChannelDropdown(monthIndex, channelFilter);

                // Расчет количества дней для сравнения (PACE)
                const currentDays = getDaysPassed(selectedDates[0], selectedDates[1]);
                const prevStart = new Date(selectedDates[0]);
                prevStart.setMonth(prevStart.getMonth() - 1);
                const prevEnd = new Date(prevStart.getFullYear(), prevStart.getMonth() + 1, 0);
                const prevDays = getDaysPassed(prevStart, prevEnd);

                const extract = (mPrefix) => {
                    let m = { 
                        reach: { tot: 0, byC: {}, t: Array(42).fill(0) },
                        leads: { tot: 0, byC: {}, t: Array(42).fill(0) },
                        subs:  { tot: 0, byC: {}, t: Array(42).fill(0) },
                        err:   { tot: 0, byC: {}, t: Array(42).fill(0), tc: Array(42).fill(0) }
                    };

                    Object.keys(rawData).forEach(key => {
                        if (!key.startsWith(`smm_${mPrefix}_`)) return;

                        const parts = key.split('_');
                        if (parts.length !== 6 || !parts[4].startsWith('d')) return;

                        const cIdx = parts[2]; 
                        if (!cIdx.startsWith('c')) return; 
                        
                        m.reach.byC[cIdx] = m.reach.byC[cIdx] || 0;
                        m.leads.byC[cIdx] = m.leads.byC[cIdx] || 0;
                        m.subs.byC[cIdx] = m.subs.byC[cIdx] || 0;
                        m.err.byC[cIdx] = m.err.byC[cIdx] || {s: 0, c: 0};

                        if (channelFilter !== 'all' && cIdx !== channelFilter) return;

                        const wIdx = parseInt(parts[3].replace('w', ''));
                        const dIdx = parseInt(parts[4].replace('d', ''));
                        const metric = parts[5];
                        const val = Number(rawData[key]) || 0;

                        if (isNaN(wIdx) || isNaN(dIdx)) return;
                        
                        const tIdx = (wIdx * 7) + dIdx;
                        if (tIdx >= 42) return; 

                        if (metric === 'JUQwJTlFJU' || metric === 'JUQwJTlGJU') { 
                            m.reach.tot += val; m.reach.byC[cIdx] += val; m.reach.t[tIdx] += val; 
                        } else if (metric === 'JUQwJTlCJU') { 
                            m.leads.tot += val; m.leads.byC[cIdx] += val; m.leads.t[tIdx] += val; 
                        } else if (metric === 'JUQwJUE3JU') { 
                            m.subs.tot += val; m.subs.byC[cIdx] += val; m.subs.t[tIdx] += val; 
                        } else if (metric === 'RVJS') { 
                            m.err.byC[cIdx].s += val; m.err.byC[cIdx].c += 1; m.err.t[tIdx] += val; m.err.tc[tIdx] += 1; 
                        }
                    });

                    let errSum = 0, errCount = 0;
                    Object.keys(m.err.byC).forEach(c => {
                        if (m.err.byC[c].c > 0) {
                            const avg = m.err.byC[c].s / m.err.byC[c].c;
                            m.err.byC[c] = avg; 
                            errSum += avg; errCount++;
                        } else {
                            m.err.byC[c] = 0;
                        }
                    });
                    m.err.tot = errCount > 0 ? errSum / errCount : 0; 
                    m.err.t = m.err.t.map((s, i) => m.err.tc[i] > 0 ? s / m.err.tc[i] : 0);

                    return m;
                };

                const current = extract(curPrefix);
                const prev = extract(prevPrefix);

                document.getElementById('val-reach').innerText = formatNum(current.reach.tot);
                document.getElementById('diff-reach').innerHTML = getCompareBadge(current.reach.tot, prev.reach.tot, currentDays, prevDays);
                renderPie('pie-reach', current.reach.byC, monthIndex);
                renderLine('line-reach', current.reach.t, '#8b5cf6');

                document.getElementById('val-leads').innerText = formatNum(current.leads.tot);
                document.getElementById('diff-leads').innerHTML = getCompareBadge(current.leads.tot, prev.leads.tot, currentDays, prevDays);
                renderPie('pie-leads', current.leads.byC, monthIndex);
                renderLine('line-leads', current.leads.t, '#3b82f6');

                document.getElementById('val-subs').innerText = formatNum(current.subs.tot);
                document.getElementById('diff-subs').innerHTML = getCompareBadge(current.subs.tot, prev.subs.tot, currentDays, prevDays);
                renderPie('pie-subs', current.subs.byC, monthIndex);
                renderLine('line-subs', current.subs.t, '#10b981');

                document.getElementById('val-err').innerText = formatPerc(current.err.tot);
                document.getElementById('diff-err').innerHTML = getCompareBadge(current.err.tot, prev.err.tot, currentDays, prevDays, true);
                renderPie('pie-err', current.err.byC, monthIndex, true);
                renderLine('line-err', current.err.t, '#64748b', true);
                
            } catch (error) {
                const errEl = document.getElementById('error-container');
                errEl.innerText = `Критическая ошибка расчетов: ${error.message}`;
                errEl.classList.remove('hidden');
                console.error("Ошибка при расчете метрик:", error);
            }
        }

        document.getElementById('current-channel').addEventListener('change', processCurrentMonthData);
    </script>
</body>
</html>
