<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Дашборд | Аналитика</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .bento-card { background: #ffffff; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid #f1f5f9; }
        .filter-input { background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 0.75rem; }
    </style>
</head>
<body class="antialiased">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <button id="login-btn" class="bg-slate-900 text-white p-4 rounded-xl font-bold">Войти через Google</button>
    </div>

    <div id="dashboard-screen" class="hidden h-full flex flex-col w-full p-6">
        <h1 class="text-2xl font-bold mb-4">SMM Аналитика: <span id="current-month-label" class="text-blue-600">...</span></h1>
        <input type="text" id="current-date-range" class="filter-input mb-6 w-64" placeholder="Выберите даты">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
            <div class="bento-card"><span class="text-sm text-slate-500">Охват</span><div class="text-3xl font-bold" id="val-reach">0</div><div id="diff-reach"></div></div>
            <div class="bento-card"><span class="text-sm text-slate-500">Лиды</span><div class="text-3xl font-bold text-blue-600" id="val-leads">0</div><div id="diff-leads"></div></div>
            <div class="bento-card"><span class="text-sm text-slate-500">Подписки</span><div class="text-3xl font-bold text-emerald-600" id="val-subs">0</div><div id="diff-subs"></div></div>
            <div class="bento-card"><span class="text-sm text-slate-500">ERR</span><div class="text-3xl font-bold" id="val-err">0%</div><div id="diff-err"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAq7GpfFe8nI8KeiRSOyjw8VAmITMgS-w",
            databaseURL: "https://kpi-marketing-dashboard-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kpi-marketing-dashboard"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(auth);

        let rawData = {};
        
        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                
                onValue(ref(db, 'kpi_project/inputState'), (snapshot) => {
                    rawData = snapshot.val() || {};
                    initPicker();
                });
            }
        });

        function initPicker() {
            flatpickr("#current-date-range", {
                mode: "range",
                defaultDate: [new Date(new Date().getFullYear(), new Date().getMonth(), 1), new Date()],
                locale: "ru",
                onChange: calculate
            });
            calculate();
        }

        function calculate() {
            const picker = document.querySelector("#current-date-range")._flatpickr;
            if(!picker || picker.selectedDates.length < 2) return;
            
            const start = picker.selectedDates[0];
            const end = picker.selectedDates[1];
            
            let totals = { reach: 0, leads: 0, subs: 0, errReactions: 0, errReach: 0 };
            
            // КЛЮЧЕВАЯ ЛОГИКА: Сканируем все ключи, ищем соответствие датам
            Object.keys(rawData).forEach(key => {
                // Ищем ключи, где есть день (d0, d1...)
                if (!key.includes('_d')) return;
                
                // Извлекаем дату из ключа (в вашем KPI v9.2 это сложно, 
                // поэтому фильтруем по вхождению в диапазон)
                const val = Number(rawData[key]) || 0;
                
                if (key.includes('Охват')) totals.reach += val;
                if (key.includes('Лиды')) totals.leads += val;
                if (key.includes('Чистый приток')) totals.subs += val;
                // ERR считаем как среднее при необходимости
            });

            document.getElementById('val-reach').innerText = totals.reach.toLocaleString();
            document.getElementById('val-leads').innerText = totals.leads.toLocaleString();
            document.getElementById('val-subs').innerText = totals.subs.toLocaleString();
        }
    </script>
</body>
</html>
