<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Дашборд | Аналитика</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .bento-card { background: #ffffff; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid #f1f5f9; display: flex; flex-direction: column; }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 2rem; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Стилизация инпутов */
        .filter-input { background: #f8fafc; border: 1px solid #e2e8f0; color: #334155; font-size: 0.875rem; font-weight: 500; border-radius: 0.75rem; padding: 0.5rem 0.75rem; outline: none; transition: all 0.2s; }
        .filter-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .filter-label { display: block; font-size: 0.75rem; font-weight: 600; color: #64748b; margin-bottom: 0.375rem; text-transform: uppercase; letter-spacing: 0.025em; }
    </style>
</head>
<body class="antialiased">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-cyan-400"></div>
            <h2 class="text-2xl font-extrabold mt-2 text-slate-900">Вход (SMM)</h2>
            <button id="login-btn" class="w-full mt-6 bg-slate-900 text-white p-3.5 rounded-xl font-bold flex justify-center items-center h-14 transition hover:bg-slate-800">
                Войти через Google
            </button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-full flex flex-col w-full">
        
        <header class="glass-header sticky top-0 z-40 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">SMM Аналитика: <span id="current-month-label" class="text-blue-600">...</span></h1>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
                <div class="bg-slate-200/50 p-1 rounded-xl flex text-sm font-semibold w-full sm:w-auto overflow-x-auto">
                    <button id="tab-current" onclick="switchTab('current')" class="px-4 py-2 bg-white text-slate-900 shadow-sm rounded-lg flex-1 sm:flex-none whitespace-nowrap transition-all">Текущий месяц</button>
                    <button id="tab-global" onclick="switchTab('global')" class="px-4 py-2 text-slate-500 hover:text-slate-900 rounded-lg flex-1 sm:flex-none whitespace-nowrap transition-all">Общая динамика</button>
                </div>
            </div>
        </header>

                <main class="scroll-area" id="view-current">
            <div class="max-w-7xl mx-auto p-4 sm:p-6">
                
                <div class="flex flex-col sm:flex-row gap-4 mb-6 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex gap-4 flex-1">
                        <div class="w-full sm:w-auto">
                            <span class="filter-label">Период анализа</span>
                            <input type="text" id="current-date-range" class="filter-input w-full sm:w-64" placeholder="Выберите диапазон дат...">
                        </div>
                    </div>
                    <div>
                        <span class="filter-label">Рекламный канал</span>
                        <select id="current-channel" class="filter-input w-full sm:w-auto min-w-[180px]">
                            <option value="all">Все каналы</option>
                            <option value="c0">Instagram</option>
                            <option value="c1">Telegram</option>
                            <option value="c2">VK</option>
                            <option value="c3">Dzen</option>
                            <option value="c4">YouTube</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-6">
                    
                    <div class="bento-card flex flex-col lg:flex-row gap-6 p-6">
                        <div class="flex-1 min-w-[200px] flex flex-col">
                            <span class="metric-title">Суммарный охват / Показы</span>
                            <div class="metric-value mt-1" id="val-reach">0</div>
                            <div class="mt-auto" id="diff-reach"></div>
                        </div>
                        <div class="flex-1 relative min-h-[140px] flex flex-col items-center lg:border-l lg:border-r border-slate-100 px-4">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">Доли каналов</span>
                            <div class="w-full h-[120px] relative"><canvas id="pie-reach"></canvas></div>
                        </div>
                        <div class="flex-[2] relative min-h-[140px]">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Динамика по дням</span>
                            <div class="w-full h-[120px] relative"><canvas id="line-reach"></canvas></div>
                        </div>
                    </div>

                    <div class="bento-card flex flex-col lg:flex-row gap-6 p-6">
                        <div class="flex-1 min-w-[200px] flex flex-col">
                            <span class="metric-title flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500 block"></span>Всего лидов</span>
                            <div class="metric-value text-blue-600 mt-1" id="val-leads">0</div>
                            <div class="mt-auto" id="diff-leads"></div>
                        </div>
                        <div class="flex-1 relative min-h-[140px] flex flex-col items-center lg:border-l lg:border-r border-slate-100 px-4">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">Доли каналов</span>
                            <div class="w-full h-[120px] relative"><canvas id="pie-leads"></canvas></div>
                        </div>
                        <div class="flex-[2] relative min-h-[140px]">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Динамика по дням</span>
                            <div class="w-full h-[120px] relative"><canvas id="line-leads"></canvas></div>
                        </div>
                    </div>

                    <div class="bento-card flex flex-col lg:flex-row gap-6 p-6">
                        <div class="flex-1 min-w-[200px] flex flex-col">
                            <span class="metric-title flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-500 block"></span>Приток подписчиков</span>
                            <div class="metric-value mt-1" id="val-subs">0</div>
                            <div class="mt-auto" id="diff-subs"></div>
                        </div>
                        <div class="flex-1 relative min-h-[140px] flex flex-col items-center lg:border-l lg:border-r border-slate-100 px-4">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">Доли каналов</span>
                            <div class="w-full h-[120px] relative"><canvas id="pie-subs"></canvas></div>
                        </div>
                        <div class="flex-[2] relative min-h-[140px]">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Динамика по дням</span>
                            <div class="w-full h-[120px] relative"><canvas id="line-subs"></canvas></div>
                        </div>
                    </div>

                    <div class="bento-card flex flex-col lg:flex-row gap-6 p-6">
                        <div class="flex-1 min-w-[200px] flex flex-col">
                            <span class="metric-title">Средний уровень ERR</span>
                            <div class="metric-value text-slate-700 mt-1" id="val-err">0%</div>
                            <div class="mt-auto" id="diff-err"></div>
                        </div>
                        <div class="flex-1 relative min-h-[140px] flex flex-col items-center lg:border-l lg:border-r border-slate-100 px-4">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">ERR по каналам</span>
                            <div class="w-full h-[120px] relative"><canvas id="pie-err"></canvas></div>
                        </div>
                        <div class="flex-[2] relative min-h-[140px]">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Динамика по дням</span>
                            <div class="w-full h-[120px] relative"><canvas id="line-err"></canvas></div>
                        </div>
                    </div>

                </div>

            </div>
        </main>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // ВАШИ КЛЮЧИ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCAq7GpfFe8nI8KeiRSOyjw8VAmITMgS-w",
            authDomain: "kpi-marketing-dashboard.firebaseapp.com",
            databaseURL: "https://kpi-marketing-dashboard-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kpi-marketing-dashboard",
            storageBucket: "kpi-marketing-dashboard.firebasestorage.app",
            messagingSenderId: "1097131516280",
            appId: "1:1097131516280:web:84ed4bb71be34ccbf8e88d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let rawData = null; 
        let datePicker = null; 

        // --- ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ВКЛАДОК ---
        // Делаем функцию глобальной, чтобы onClick в HTML её видел
        window.switchTab = function(tabName) {
            const viewCurrent = document.getElementById('view-current');
            const viewGlobal = document.getElementById('view-global');
            const btnCurrent = document.getElementById('tab-current');
            const btnGlobal = document.getElementById('tab-global');

            const activeClass = "px-4 py-2 bg-white text-slate-900 shadow-sm rounded-lg flex-1 sm:flex-none whitespace-nowrap transition-all";
            const inactiveClass = "px-4 py-2 text-slate-500 hover:text-slate-900 rounded-lg flex-1 sm:flex-none whitespace-nowrap transition-all";

            if (tabName === 'current') {
                viewCurrent.classList.remove('hidden');
                viewGlobal.classList.add('hidden');
                btnCurrent.className = activeClass;
                btnGlobal.className = inactiveClass;
                processCurrentMonthData(); 
            } else {
                viewCurrent.classList.add('hidden');
                viewGlobal.classList.remove('hidden');
                btnCurrent.className = inactiveClass;
                btnGlobal.className = activeClass;
                processGlobalData(); 
            }
        };

        // --- УСТАНОВКА ДАТ ПО УМОЛЧАНИЮ ---
        function updateMonthLabel(date) {
            const monthName = date.toLocaleString('ru-RU', { month: 'long' });
            const capitalizedMonth = monthName.charAt(0).toUpperCase() + monthName.slice(1);
            document.getElementById('current-month-label').innerText = capitalizedMonth;
        }

        function setInitialDates() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            
            const firstDay = `${year}-${month}-01`;
            const lastDay = new Date(year, today.getMonth() + 1, 0).getDate();
            const lastDayFormatted = `${year}-${month}-${lastDay}`;

            datePicker = flatpickr("#current-date-range", {
                mode: "range",
                dateFormat: "Y-m-d",
                defaultDate: [firstDay, lastDayFormatted],
                locale: "ru",
                onChange: function(selectedDates) {
                    if (selectedDates.length === 2) {
                        updateMonthLabel(selectedDates[0]);
                        processCurrentMonthData();
                    }
                }
            });

            updateMonthLabel(today);

            document.getElementById('global-month-start').value = `${year}-01`;
            document.getElementById('global-month-end').value = `${year}-${month}`;
        }

        // --- АВТОРИЗАЦИЯ И СБОР ДАННЫХ ---
        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, provider));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                
                setInitialDates(); 

                const dbRef = ref(db, 'kpi_project/inputState');
                onValue(dbRef, (snapshot) => {
                    rawData = snapshot.val();
                    if(rawData) {
                        processCurrentMonthData();
                        processGlobalData();
                    }
                }, (error) => {
                    alert("Доступ запрещен. Проверьте права в Firebase.");
                });
            }
        });

        // --- ФУНКЦИИ РАСЧЕТА МЕТРИК ---
               // Глобальное хранилище графиков (чтобы они не накладывались друг на друга при обновлении)
        window.smmCharts = {};

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        const formatNum = (num) => new Intl.NumberFormat('ru-RU').format(Math.round(num || 0));
        const formatPerc = (num) => (num || 0).toFixed(2) + '%';

        function getCompareBadge(current, prev, isPercent = false) {
            if (prev === 0 || prev === undefined || isNaN(prev)) return `<div class="badge badge-neutral mt-2">Нет данных за прошлый месяц</div>`;
            const diff = ((current - prev) / prev) * 100;
            // Логика: рост любой метрики (охват, лиды, подписки, ERR) - это всегда хорошо (зеленый)
            const colorClass = diff >= 0 ? 'badge-green' : 'badge-red';
            const trendText = diff >= 0 ? '👍 Лучше' : '📉 Хуже';
            const diffAbs = Math.abs(diff).toFixed(1);
            const prevText = isPercent ? prev.toFixed(2) + '%' : formatNum(prev);
            
            return `
                <div class="badge ${colorClass} mt-3 flex flex-col gap-1 items-start">
                    <span>${trendText} на ${diffAbs}%</span>
                    <span class="text-[10px] font-normal opacity-70">Прошлый месяц: ${prevText}</span>
                </div>
            `;
        }

        function renderPie(id, dataObj, isAverage = false) {
            const ctx = document.getElementById(id).getContext('2d');
            if (window.smmCharts[id]) window.smmCharts[id].destroy();
            
            const labels = ['Insta', 'TG', 'VK', 'Dzen', 'YouTube'];
            const values = [dataObj.c0, dataObj.c1, dataObj.c2, dataObj.c3, dataObj.c4];
            const colors = ['#e1306c', '#0088cc', '#0077ff', '#10b981', '#ff0000'];

            const fLabels = [], fValues = [], fColors = [];
            values.forEach((v, i) => {
                // Если считаем ERR (isAverage), выводим все каналы, где ERR > 0
                if(v > 0) { fLabels.push(labels[i]); fValues.push(v); fColors.push(colors[i]); }
            });

            if (fValues.length === 0) {
                fLabels.push('Нет данных'); fValues.push(1); fColors.push('#e2e8f0');
            }

            window.smmCharts[id] = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: fLabels, datasets: [{ data: fValues, backgroundColor: fColors, borderWidth: 0 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '65%',
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            color: '#fff', font: { weight: 'bold', size: 10 },
                            formatter: (v) => {
                                if (v === 1 && fLabels[0] === 'Нет данных') return '';
                                if (isAverage) return v.toFixed(1) + '%';
                                if (v >= 1000000) return (v/1000000).toFixed(1) + 'M';
                                if (v >= 1000) return (v/1000).toFixed(0) + 'k';
                                return Math.round(v);
                            }
                        }
                    }
                }
            });
        }

        function renderLine(id, timelineArray, color, isPercent = false) {
            const ctx = document.getElementById(id).getContext('2d');
            if (window.smmCharts[id]) window.smmCharts[id].destroy();

            // Обрезаем пустые дни в конце (будущие дни месяца)
            let lastNonZero = timelineArray.length - 1;
            while(lastNonZero >= 0 && timelineArray[lastNonZero] === 0) lastNonZero--;
            const activeData = timelineArray.slice(0, lastNonZero >= 0 ? lastNonZero + 1 : 0);
            const labels = activeData.map((_, i) => `День ${i+1}`);

            window.smmCharts[id] = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ data: activeData, borderColor: color, backgroundColor: color + '1a', borderWidth: 2, tension: 0.4, fill: true, pointRadius: 1, pointHoverRadius: 5 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, datalabels: { display: false } },
                    scales: { x: { display: false }, y: { border: {display: false}, grid: { borderDash: [4, 4] }, ticks: { callback: v => isPercent ? v + '%' : v } } },
                    interaction: { mode: 'index', intersect: false }
                }
            });
        }

        // --- ГЛАВНАЯ ФУНКЦИЯ ---
        function processCurrentMonthData() {
            if (!rawData || !datePicker) return;
            const selectedDates = datePicker.selectedDates;
            if (selectedDates.length < 2) return; 

            // Определяем индекс месяца (m0, m1, m2) исходя из стартовой даты (Янв 2026 = m0)
            const baseYear = 2026;
            const targetDate = selectedDates[0];
            const monthIndex = (targetDate.getFullYear() - baseYear) * 12 + targetDate.getMonth();
            const curPrefix = `m${monthIndex}`;
            const prevPrefix = `m${monthIndex - 1}`;
            const channelFilter = document.getElementById('current-channel').value;

            // Функция-экстрактор данных из сырого JSON
            const extract = (mPrefix) => {
                let m = { 
                    reach: { total: 0, byC: {c0:0, c1:0, c2:0, c3:0, c4:0}, t: Array(35).fill(0) },
                    leads: { total: 0, byC: {c0:0, c1:0, c2:0, c3:0, c4:0}, t: Array(35).fill(0) },
                    subs:  { total: 0, byC: {c0:0, c1:0, c2:0, c3:0, c4:0}, t: Array(35).fill(0) },
                    err:   { total: 0, count: 0, byC: {c0:{s:0,c:0}, c1:{s:0,c:0}, c2:{s:0,c:0}, c3:{s:0,c:0}, c4:{s:0,c:0}}, t: Array(35).fill(0), tCount: Array(35).fill(0) }
                };

                Object.keys(rawData).forEach(key => {
                    if (!key.startsWith(`smm_${mPrefix}_`)) return;
                    const parts = key.split('_');
                    if (parts.length < 6) return;
                    const cIdx = parts[2]; 
                    const wIdx = parseInt(parts[3].replace('w', ''));
                    const dIdx = parseInt(parts[4].replace('d', ''));
                    const metricId = parts[5];
                    
                    if (channelFilter !== 'all' && cIdx !== channelFilter) return;
                    if (isNaN(wIdx) || isNaN(dIdx)) return;

                    const val = Number(rawData[key]) || 0;
                    const tIdx = (wIdx * 7) + dIdx;

                    if (metricId === 'JUQwJTlFJU' || metricId === 'JUQwJTlGJU') { // Охват / Показы
                        m.reach.total += val; m.reach.byC[cIdx] += val; m.reach.t[tIdx] += val;
                    } else if (metricId === 'JUQwJTlCJU') { // Лиды
                        m.leads.total += val; m.leads.byC[cIdx] += val; m.leads.t[tIdx] += val;
                    } else if (metricId === 'JUQwJUE3JU') { // Подписки
                        m.subs.total += val; m.subs.byC[cIdx] += val; m.subs.t[tIdx] += val;
                    } else if (metricId === 'RVJS') { // ERR
                        m.err.total += val; m.err.count += 1; 
                        m.err.byC[cIdx].s += val; m.err.byC[cIdx].c += 1;
                        m.err.t[tIdx] += val; m.err.tCount[tIdx] += 1;
                    }
                });

                // Усреднение ERR
                m.err.total = m.err.count > 0 ? (m.err.total / m.err.count) : 0;
                ['c0','c1','c2','c3','c4'].forEach(c => { m.err.byC[c] = m.err.byC[c].c > 0 ? (m.err.byC[c].s / m.err.byC[c].c) : 0; });
                m.err.t = m.err.t.map((sum, i) => m.err.tCount[i] > 0 ? sum / m.err.tCount[i] : 0);

                return m;
            };

            const current = extract(curPrefix);
            const prev = extract(prevPrefix);

            // 1. ОХВАТЫ
            document.getElementById('val-reach').innerText = formatNum(current.reach.total);
            document.getElementById('diff-reach').innerHTML = getCompareBadge(current.reach.total, prev.reach.total);
            renderPie('pie-reach', current.reach.byC);
            renderLine('line-reach', current.reach.t, '#8b5cf6'); // Purple

            // 2. ЛИДЫ
            document.getElementById('val-leads').innerText = formatNum(current.leads.total);
            document.getElementById('diff-leads').innerHTML = getCompareBadge(current.leads.total, prev.leads.total);
            renderPie('pie-leads', current.leads.byC);
            renderLine('line-leads', current.leads.t, '#3b82f6'); // Blue

            // 3. ПОДПИСЧИКИ
            document.getElementById('val-subs').innerText = formatNum(current.subs.total);
            document.getElementById('diff-subs').innerHTML = getCompareBadge(current.subs.total, prev.subs.total);
            renderPie('pie-subs', current.subs.byC);
            renderLine('line-subs', current.subs.t, '#10b981'); // Emerald

            // 4. ERR
            document.getElementById('val-err').innerText = formatPerc(current.err.total);
            document.getElementById('diff-err').innerHTML = getCompareBadge(current.err.total, prev.err.total, true);
            renderPie('pie-err', current.err.byC, true);
            renderLine('line-err', current.err.t, '#64748b', true); // Slate
        }

        function processGlobalData() {
            if (!rawData) return;
            const startMonth = document.getElementById('global-month-start').value;
            const endMonth = document.getElementById('global-month-end').value;
            const channel = document.getElementById('global-channel').value;

            console.log('Глобальная динамика, фильтры изменены:', { startMonth, endMonth, channel });
        }

        // --- СЛУШАТЕЛИ СОБЫТИЙ ДЛЯ ФИЛЬТРОВ ---
        document.getElementById('current-channel').addEventListener('change', processCurrentMonthData);
        document.getElementById('global-month-start').addEventListener('change', processGlobalData);
        document.getElementById('global-month-end').addEventListener('change', processGlobalData);
        document.getElementById('global-channel').addEventListener('change', processGlobalData);
    </script>
</body>
</html>
